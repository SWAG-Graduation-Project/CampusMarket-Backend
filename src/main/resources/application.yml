spring:
  profiles:
    active: local
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  servlet:
    context-path: /api

app:
  mail:
    admin-email: ${MAIL_ADMIN_EMAIL}

ai:
  base-url: https://watertrue-campusmarket.hf.space
  api:
    secret-key: ${AI_API_SECRET_KEY}
