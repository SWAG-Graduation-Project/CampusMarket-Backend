name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot project
        run: ./gradlew clean bootJar -x test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ADMIN_EMAIL: ${{ secrets.MAIL_ADMIN_EMAIL }}
          AI_API_SECRET_KEY: ${{ secrets.AI_API_SECRET_KEY }}

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./build/libs/*.jar"
          target: "/home/ubuntu/app"

      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if lsof -i:8080 -t >/dev/null; then
              kill -9 $(lsof -i:8080 -t)
            fi

            JAR_PATH=$(find /home/ubuntu/app -name "*.jar" | head -n 1)

            nohup java \
              -Dspring.profiles.active=prod \
              -DDB_URL=${{ secrets.DB_URL }} \
              -DDB_USERNAME=${{ secrets.DB_USERNAME }} \
              -DDB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -DAWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -DAWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              -DAWS_REGION=${{ secrets.AWS_REGION }} \
              -DS3_BUCKET=${{ secrets.S3_BUCKET }} \
              -jar "$JAR_PATH" \
              > /home/ubuntu/app/app.log 2>&1 &